{% extends 'employees/base.html' %}
{% block title %}Delete Department - EMS{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title text-danger"><i class="bi bi-trash me-2"></i>Delete Department</h1>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="content-card text-center py-5">
            <i class="bi bi-exclamation-triangle-fill text-danger mb-4" style="font-size:4rem;"></i>
            <h4 class="fw-bold">Are you sure?</h4>
            <p class="text-muted mb-4">
                You are about to delete the <strong>{{ department.name }}</strong> department.<br>
                This action <strong class="text-danger">cannot be undone</strong>.
            </p>
            <div class="d-flex gap-3 justify-content-center">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-5">
                        <i class="bi bi-trash me-2"></i>Yes, Delete
                    </button>
                </form>
                <a href="{% url 'department_list' %}" class="btn btn-outline-secondary px-5">
                    <i class="bi bi-x-circle me-2"></i>Cancel
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
