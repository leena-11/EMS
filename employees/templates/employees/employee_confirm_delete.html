{% extends 'employees/base.html' %}
{% block title %}Delete Employee - EMS{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title text-danger"><i class="bi bi-trash me-2"></i>Delete Employee</h1>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="content-card text-center py-5">
            <div class="delete-icon-wrapper mb-4">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
            </div>
            <h4 class="fw-bold">Are you sure?</h4>
            <p class="text-muted mb-4">You are about to delete <strong>{{ employee.full_name }}</strong>.<br>This action <strong class="text-danger">cannot be undone</strong>.</p>
            <div class="d-flex gap-3 justify-content-center">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-5">
                        <i class="bi bi-trash me-2"></i>Yes, Delete
                    </button>
                </form>
                <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary px-5">
                    <i class="bi bi-x-circle me-2"></i>Cancel
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
